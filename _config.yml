# About Section
# about_title: About Me
about_profile_image: images/profile.jpg
about_content: |
  Hi, my name is Yuan Zhang. I am a Cloud / System Engineer with experience in cloud infrastructure, automation, and system operations.

  I mainly work with <mark>AWS</mark>, <mark>GCP</mark>, and <mark>Azure</mark>, and I am interested in building reliable, maintainable, and automated systems.

  My recent work focuses on cloud architecture, CI/CD automation, infrastructure as code, and improving deployment workflows.

content:
  - title: Skills
    layout: text
    content: |
      - Cloud Platforms: AWS, GCP, Azure
      - Infrastructure as Code: AWS CDK, CloudFormation
      - CI/CD: GitHub Actions, semantic-release
      - Programming: TypeScript, Python
      - Systems: Linux, networking, troubleshooting
      - Architecture: VPC, API Gateway, Lambda, Step Functions, Transit Gateway, EventBridge, Secrets Manager

  - title: Projects
    layout: list
    content:
      - layout: left
        title: Cloud Infrastructure Automation
        description: |
          Designed and maintained cloud infrastructure using AWS CDK and TypeScript.

          Worked with AWS services such as Lambda, Step Functions, API Gateway, VPC, Transit Gateway, EventBridge, Secrets Manager, and Lambda Layers to build scalable and maintainable cloud workflows.

      - layout: left
        title: GitHub Actions CI/CD Automation
        description: |
          Built CI/CD workflows with GitHub Actions for automated testing, building, and release management.

          Integrated semantic-release to automate versioning and release generation, and configured build artifacts to include version numbers in filenames.

      - layout: left
        title: Technical Notes and Knowledge Base
        link: https://motoish.github.io/jb-notes/src/index.html
        link_text: View Notes
        additional_links:
          - title: motoish/jb-notes
            icon: fab fa-github
            url: https://github.com/motoish/jb-notes
        description: |
          Maintained a personal technical knowledge base covering cloud platforms, programming, networking, and system design topics.

          Used the site to organize engineering notes, cloud architecture references, and practical troubleshooting knowledge.

  - title: Education
    layout: list
    content:
      - layout: left
        title: Saitama University
        caption: 2015 - 2017
        sub_title: Humanities and Social Sciences
        description: |
          Studied humanities and social sciences with a focus on Japanese and Asian studies.

          Through graduate-level research and coursework, I developed analytical, communication, and problem-solving skills, which continue to support my work as an engineer in multicultural environments.

      - layout: left
        title: Bunkyo University
        caption: 2014 - 2015
        sub_title: Foreign Student Department
        description: |
          Completed Japanese language and cultural studies as preparation for graduate-level education in Japan.

          Built a strong foundation in Japanese communication, academic writing, and cross-cultural understanding.

  - title: A Little More About Me
    layout: text
    content: |
      Outside of work, I enjoy learning about cloud infrastructure, software engineering, and system design.

      My other interests include:
      - Walking
      - Gaming, especially Teamfight Tactics

