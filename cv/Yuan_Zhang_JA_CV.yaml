        highlights:
          - Go を用いたバックエンド機能の実装、テスト
          - GCP の各種マネージドサービスを利用したクラウドアプリケーション開発
          - アジャイル開発の中で、既存機能改善と新規機能開発に対応
      - company: 社内向けWebアプリケーション開発（オンプレミス）
        position: 開発
        start_date: 2018-04
        end_date: 2019-03
        location: 社内システム / 業務系
        summary: 社内システムプロジェクトにて、要件定義からテストまで、フロントエンド・バックエンド双方の開発工程を担当。
        highlights:
          - 要件定義、基本設計、詳細設計、実装、テストまで一連の工程を担当
          - Java / Spring Boot を中心に、業務要件に合わせた機能改修を実施
