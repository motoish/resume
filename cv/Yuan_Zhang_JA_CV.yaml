          - TypeScript / AWS CDK を用いたサーバレス基盤およびバックエンド機能の設計・実装
          - API Gateway、Lambda、RDS、Step Functions、SQS、CloudFormation、Route 53、CloudFront、S3 等を利用したクラウドアーキテクチャの構築・改修
