          - Azure Batch、Storage、Container Registry、VM、Security Center、Monitor 等を利用した基盤機能の実装
          - GitLab / Jenkins を用いた開発フローの中で、実装・テスト・改修を継続的に実施
      - company: 商社向け中古モバイル認定システム開発（GCP）
